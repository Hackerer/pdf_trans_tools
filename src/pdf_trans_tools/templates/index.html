<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF翻译工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .header .version {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
        }
        .content {
            padding: 32px;
        }
        .upload-section {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 24px;
            margin-bottom: 24px;
        }
        .upload-box {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 48px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-box:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .upload-box.dragover {
            border-color: #667eea;
            background: #f0f3ff;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .upload-text {
            color: #666;
            font-size: 16px;
        }
        .upload-text strong {
            color: #667eea;
        }
        .file-input {
            display: none;
        }
        .settings-panel {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 24px;
        }
        .settings-panel h3 {
            margin-bottom: 16px;
            color: #333;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .form-group select, .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-group select:focus, .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-group input {
            width: 18px;
            height: 18px;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #e9ecef;
            color: #495057;
        }
        .btn-secondary:hover {
            background: #dee2e6;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .preview-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }
        .preview-box {
            border: 1px solid #eee;
            border-radius: 12px;
            overflow: hidden;
        }
        .preview-header {
            background: #f8f9fa;
            padding: 12px 16px;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #eee;
        }
        .preview-content {
            height: 300px;
            overflow-y: auto;
            padding: 16px;
            font-family: "Courier New", monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #444;
        }
        .validation-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .validation-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .validation-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .validation-icon.success {
            background: #d4edda;
            color: #155724;
        }
        .validation-icon.error {
            background: #f8d7da;
            color: #721c24;
        }
        .validation-title {
            font-weight: 600;
            color: #333;
        }
        .validation-details {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        .status-bar {
            padding: 16px;
            background: #e9ecef;
            border-radius: 8px;
            text-align: center;
            color: #495057;
            font-size: 14px;
        }
        .status-bar.success {
            background: #d4edda;
            color: #155724;
        }
        .status-bar.error {
            background: #f8d7da;
            color: #721c24;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .file-list {
            margin-top: 16px;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .file-name {
            font-size: 14px;
            color: #333;
        }
        .file-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .file-status.pending {
            background: #fff3cd;
            color: #856404;
        }
        .file-status.success {
            background: #d4edda;
            color: #155724;
        }
        .file-status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .batch-section {
            margin-bottom: 24px;
        }
        .progress-section {
            margin-top: 16px;
        }
        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text {
            text-align: center;
            margin-top: 8px;
            font-size: 14px;
            color: #666;
        }
        .batch-result {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .batch-result-item {
            background: white;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 12px;
        }
        .batch-result-item.success {
            border-color: #28a745;
        }
        .batch-result-item.error {
            border-color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PDF翻译工具</h1>
            <span class="version">v1.2.0</span>
        </div>

        <div class="content">
            <div class="upload-section">
                <div class="upload-box" id="uploadBox">
                    <div class="upload-icon">📄</div>
                    <div class="upload-text">
                        拖拽PDF文件到这里<br>
                        或 <strong>点击选择文件</strong>
                    </div>
                    <input type="file" id="fileInput" class="file-input" accept=".pdf">
                </div>

                <div class="settings-panel">
                    <h3>翻译设置</h3>
                    <div class="form-group">
                        <label>源语言</label>
                        <select id="sourceLang">
                            <option value="">自动检测</option>
                            <option value="en">英语</option>
                            <option value="zh">中文</option>
                            <option value="ja">日语</option>
                            <option value="ko">韩语</option>
                            <option value="fr">法语</option>
                            <option value="de">德语</option>
                            <option value="es">西班牙语</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>目标语言</label>
                        <select id="targetLang">
                            <option value="zh" selected>中文</option>
                            <option value="en">英语</option>
                            <option value="ja">日语</option>
                            <option value="ko">韩语</option>
                            <option value="fr">法语</option>
                            <option value="de">德语</option>
                            <option value="es">西班牙语</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="checkbox-group">
                            <input type="checkbox" id="enableValidation" checked>
                            启用一致性验证
                        </label>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" id="translateBtn" disabled>开始翻译</button>
                <button class="btn btn-secondary" id="extractBtn" disabled>提取文本</button>
                <button class="btn btn-secondary" id="batchBtn">批量处理</button>
            </div>

            <div class="batch-section" id="batchSection" style="display: none;">
                <div class="upload-box" id="batchUploadBox" style="padding: 24px;">
                    <div class="upload-text">
                        拖拽多个PDF文件到此处<br>
                        或 <strong>点击选择多个文件</strong>
                    </div>
                    <input type="file" id="batchFileInput" class="file-input" accept=".pdf" multiple>
                </div>
                <div class="file-list" id="fileList"></div>
                <div class="batch-actions" id="batchActions" style="display: none; margin-top: 12px;">
                    <button class="btn btn-secondary" id="clearBatchBtn">清空列表</button>
                </div>
                <div class="progress-section" id="progressSection" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">0 / 0</div>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>处理中...</div>
            </div>

            <div class="preview-section">
                <div class="preview-box">
                    <div class="preview-header">原文预览</div>
                    <div class="preview-content" id="originalText">等待上传文件...</div>
                </div>
                <div class="preview-box">
                    <div class="preview-header">译文预览</div>
                    <div class="preview-content" id="translatedText">等待翻译完成...</div>
                </div>
            </div>

            <div class="validation-section" id="validationSection" style="display: none;">
                <div class="validation-header">
                    <div class="validation-icon" id="validationIcon">✓</div>
                    <div class="validation-title" id="validationTitle">验证结果</div>
                </div>
                <div class="validation-details" id="validationDetails"></div>
            </div>

            <div class="status-bar" id="statusBar">
                准备就绪
            </div>
        </div>
    </div>

    <script>
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const translateBtn = document.getElementById('translateBtn');
        const extractBtn = document.getElementById('extractBtn');
        const loading = document.getElementById('loading');
        const originalText = document.getElementById('originalText');
        const translatedText = document.getElementById('translatedText');
        const validationSection = document.getElementById('validationSection');
        const statusBar = document.getElementById('statusBar');

        let currentFile = null;

        // File upload handling
        uploadBox.addEventListener('click', () => fileInput.click());

        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('dragover');
        });

        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('dragover');
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].name.endsWith('.pdf')) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            currentFile = file;
            translateBtn.disabled = false;
            extractBtn.disabled = false;
            statusBar.textContent = `已选择: ${file.name}`;
            statusBar.className = 'status-bar';
            originalText.textContent = '正在提取文本...';

            // Extract text preview
            const formData = new FormData();
            formData.append('file', file);

            fetch('/api/extract', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    originalText.textContent = data.text.substring(0, 2000) + (data.text.length > 2000 ? '\n...(截断)' : '');
                } else {
                    originalText.textContent = '提取失败: ' + data.error;
                }
            })
            .catch(err => {
                originalText.textContent = '错误: ' + err.message;
            });
        }

        // Translate button
        translateBtn.addEventListener('click', () => {
            if (!currentFile) return;

            loading.style.display = 'block';
            statusBar.textContent = '翻译中...';
            statusBar.className = 'status-bar';

            const formData = new FormData();
            formData.append('file', currentFile);
            formData.append('target_lang', document.getElementById('targetLang').value);
            formData.append('source_lang', document.getElementById('sourceLang').value);
            formData.append('validate', document.getElementById('enableValidation').checked);

            fetch('/api/translate', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                loading.style.display = 'none';

                if (data.success) {
                    translatedText.textContent = '翻译完成! 文件已保存.';
                    statusBar.textContent = '翻译成功!';
                    statusBar.className = 'status-bar success';

                    if (data.validation) {
                        showValidation(data.validation);
                    }
                } else {
                    translatedText.textContent = '翻译失败: ' + data.error;
                    statusBar.textContent = '翻译失败: ' + data.error;
                    statusBar.className = 'status-bar error';
                }
            })
            .catch(err => {
                loading.style.display = 'none';
                translatedText.textContent = '错误: ' + err.message;
                statusBar.textContent = '错误: ' + err.message;
                statusBar.className = 'status-bar error';
            });
        });

        // Extract button
        extractBtn.addEventListener('click', () => {
            if (!currentFile) return;

            loading.style.display = 'block';
            statusBar.textContent = '提取中...';

            const formData = new FormData();
            formData.append('file', currentFile);

            fetch('/api/extract', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                loading.style.display = 'none';

                if (data.success) {
                    originalText.textContent = data.text;
                    translatedText.textContent = '点击"开始翻译"生成译文';
                    statusBar.textContent = `提取成功，共 ${data.page_count} 页`;
                } else {
                    originalText.textContent = '提取失败: ' + data.error;
                    statusBar.textContent = '提取失败: ' + data.error;
                }
            })
            .catch(err => {
                loading.style.display = 'none';
                originalText.textContent = '错误: ' + err.message;
                statusBar.textContent = '错误: ' + err.message;
            });
        });

        function showValidation(validation) {
            validationSection.style.display = 'block';
            const icon = document.getElementById('validationIcon');
            const title = document.getElementById('validationTitle');
            const details = document.getElementById('validationDetails');

            if (validation.is_valid) {
                icon.textContent = '✓';
                icon.className = 'validation-icon success';
                title.textContent = '验证通过 - 结构一致';
                details.textContent = validation.message;
            } else {
                icon.textContent = '⚠';
                icon.className = 'validation-icon error';
                title.textContent = '验证发现问题';
                details.textContent = validation.differences ? validation.differences.join('\n') : validation.message;
            }
        }

        // Batch processing
        const batchBtn = document.getElementById('batchBtn');
        const batchSection = document.getElementById('batchSection');
        const batchUploadBox = document.getElementById('batchUploadBox');
        const batchFileInput = document.getElementById('batchFileInput');
        const fileList = document.getElementById('fileList');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        let batchFiles = [];

        batchBtn.addEventListener('click', () => {
            batchSection.style.display = batchSection.style.display === 'none' ? 'block' : 'none';
        });

        batchUploadBox.addEventListener('click', () => batchFileInput.click());

        batchUploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            batchUploadBox.classList.add('dragover');
        });

        batchUploadBox.addEventListener('dragleave', () => {
            batchUploadBox.classList.remove('dragover');
        });

        batchUploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            batchUploadBox.classList.remove('dragover');
            handleBatchFiles(Array.from(e.dataTransfer.files));
        });

        batchFileInput.addEventListener('change', (e) => {
            handleBatchFiles(Array.from(e.target.files));
        });

        function handleBatchFiles(files) {
            const pdfFiles = files.filter(f => f.name.endsWith('.pdf'));
            if (pdfFiles.length === 0) return;

            batchFiles = pdfFiles;
            renderFileList();
            document.getElementById('batchActions').style.display = 'block';
            progressSection.style.display = 'block';
            updateProgress(0, batchFiles.length);

            // Automatically start batch processing
            processBatch();
        }

        // Clear batch button
        document.getElementById('clearBatchBtn').addEventListener('click', () => {
            batchFiles = [];
            fileList.innerHTML = '';
            document.getElementById('batchActions').style.display = 'none';
            progressSection.style.display = 'none';
            updateProgress(0, 0);
            batchFileInput.value = '';
        });

        function renderFileList() {
            fileList.innerHTML = batchFiles.map((file, idx) => `
                <div class="file-item" data-idx="${idx}">
                    <span class="file-name">${file.name}</span>
                    <span class="file-status pending" id="status-${idx}">等待</span>
                </div>
            `).join('');
        }

        function updateProgress(completed, total) {
            const percent = total > 0 ? (completed / total * 100) : 0;
            progressFill.style.width = percent + '%';
            progressText.textContent = `${completed} / ${total}`;
        }

        async function processBatch() {
            if (batchFiles.length === 0) return;

            for (let i = 0; i < batchFiles.length; i++) {
                const file = batchFiles[i];
                const statusEl = document.getElementById(`status-${i}`);

                statusEl.textContent = '处理中';
                statusEl.className = 'file-status pending';

                const formData = new FormData();
                formData.append('file', file);
                formData.append('target_lang', document.getElementById('targetLang').value);
                formData.append('validate', document.getElementById('enableValidation').checked);

                try {
                    const response = await fetch('/api/translate', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();

                    if (data.success) {
                        statusEl.textContent = '成功';
                        statusEl.className = 'file-status success';
                    } else {
                        statusEl.textContent = '失败';
                        statusEl.className = 'file-status error';
                    }
                } catch (err) {
                    statusEl.textContent = '错误';
                    statusEl.className = 'file-status error';
                }

                updateProgress(i + 1, batchFiles.length);
            }

            statusBar.textContent = `批量处理完成: ${batchFiles.length} 个文件`;
        }

        // Start batch processing when files are added
    </script>
</body>
</html>
